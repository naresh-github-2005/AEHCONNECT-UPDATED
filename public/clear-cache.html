<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clear Cache & Restart</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            max-width: 600px;
        }
        h1 { margin: 0 0 20px 0; font-size: 2em; }
        .status { font-size: 1.2em; margin: 20px 0; }
        .loading { 
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Cache & Restart</h1>
        <div class="status" id="status">Click the button to clear cache and restart</div>
        <button onclick="clearAndRestart()">Clear Everything & Restart</button>
        <div id="loading" style="display: none;">
            <div class="loading"></div>
            <p>Clearing cache...</p>
        </div>
    </div>

    <script>
        function clearAndRestart() {
            document.getElementById('loading').style.display = 'block';
            document.querySelector('button').style.display = 'none';
            document.getElementById('status').textContent = 'Clearing all caches...';

            // Clear all possible caches
            if ('caches' in window) {
                caches.keys().then(keys => {
                    keys.forEach(key => caches.delete(key));
                });
            }

            // Clear localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();

            // Clear cookies
            document.cookie.split(";").forEach(c => {
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });

            document.getElementById('status').textContent = '✅ Cache cleared! Redirecting...';

            setTimeout(() => {
                window.location.href = '/?nocache=' + Date.now();
            }, 1000);
        }
    </script>
</body>
</html>
